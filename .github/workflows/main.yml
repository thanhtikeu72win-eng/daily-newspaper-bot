name: Daily Newspaper Bot

on:
  schedule:
    # နေ့စဉ် မြန်မာစံတော်ချိန် မနက် ၇:၀၀ (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # ခလုတ်နှိပ်ပြီး စမ်းသပ်ရန်

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot_auto.py
