name: Daily Newspaper Bot

on:
  schedule:
    - cron: '30 0 * * *' # 7:00 AM Myanmar Time
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Keepalive အတွက် ရေးခွင့်ပြုခြင်း

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot_auto.py
        
      # --- ၆၀ ရက်မကျော်အောင် ကာကွယ်ပေးမည့် အပိုင်း ---
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v1
